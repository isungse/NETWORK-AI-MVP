<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Network AI MVP</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="dashboard">
    <header class="topbar">
      <div class="topbar-title">
        <h1>Network AI MVP</h1>
        <p id="apiStatus" class="status-hidden">Checking API...</p>
      </div>
      <div class="topbar-actions">
        <a class="monitor-link" href="/operations">Operations</a>
        <a class="monitor-link" href="/monitoring" target="_blank" rel="noreferrer">Monitoring</a>
        <div class="mode-stack" aria-label="Safety mode">
          <span class="mode-pill">READ-ONLY</span>
        </div>
      </div>
    </header>

    <main class="layout dashboard-only">
      <section class="panel dashboard-panel" aria-labelledby="topologyTitle">
        <div class="panel-head">
          <div>
            <h2 id="topologyTitle">Device Map</h2>
            <span id="dashboardUpdated" class="muted">Loading device health...</span>
          </div>
          <div class="panel-actions">
            <button id="dashboardShowAll" type="button">All Devices</button>
            <button id="dashboardShowIssues" type="button">Issues Only</button>
          </div>
        </div>
        <div id="topologyMap" class="topology-map"></div>
      </section>

      <section class="panel dashboard-diagnostic-panel" aria-labelledby="summaryTitle">
        <div class="panel-head">
          <div>
            <h2 id="summaryTitle">Diagnostic Summary</h2>
            <span id="selectedDeviceId" class="muted">Click a device on the map</span>
          </div>
        </div>
        <div id="diagnosticSummary" class="summary-box">Select a device on the map.</div>
        <div id="diagnosticFindings" class="finding-list"></div>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
